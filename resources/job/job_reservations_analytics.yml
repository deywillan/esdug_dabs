resources:
  jobs:
    job_reservations_analytics:
      name: job_reservations_analytics
      email_notifications:
        on_failure:
          - deivilanmattos@gmail.com
      schedule:
        quartz_cron_expression: 19 0 7 * * ?
        timezone_id: America/Sao_Paulo
        pause_status: UNPAUSED
      tasks:
        - task_key: bronze
          notebook_task:
            notebook_path: /Workspace/Users/deivilanmattos@gmail.com/ES
              DUG/esdug_dabs/src/bronze
            base_parameters:
              catalog_source: samples
              catalog_sink: catalog_sink
            source: WORKSPACE
          environment_key: Default
        - task_key: silver
          depends_on:
            - task_key: bronze
          notebook_task:
            notebook_path: /Workspace/Users/deivilanmattos@gmail.com/ES
              DUG/esdug_dabs/src/silver
            base_parameters:
              catalog_source: bronze_dev
              catalog_sink: silver_dev
            source: WORKSPACE
          environment_key: Default
        - task_key: gold
          depends_on:
            - task_key: silver
          notebook_task:
            notebook_path: /Workspace/Users/deivilanmattos@gmail.com/ES
              DUG/esdug_dabs/src/gold
            base_parameters:
              catalog_source: silver_dev
              catalog_sink: gold_dev
            source: WORKSPACE
          environment_key: Default
      tags:
        business.domain: Sales
        business.owner: Data Engineering Team
      queue:
        enabled: true
      environments:
        - environment_key: Default
          spec:
            environment_version: "5"
      performance_target: STANDARD
