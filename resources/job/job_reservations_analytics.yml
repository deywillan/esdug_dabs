resources:
  jobs:
    job_reservations_analytics:
      name: job_reservations_analytics
      email_notifications:
        on_failure:
          - deivilanmattos@gmail.com
      schedule:
        quartz_cron_expression: 19 0 7 * * ?
        timezone_id: America/Sao_Paulo
        pause_status: UNPAUSED
      tasks:
        - task_key: bronze
          notebook_task:
            notebook_path: ../../src/notebooks/bronze.ipynb
            base_parameters:
              catalog_source: samples
              catalog_sink: ${var.bronze_catalog}
            source: WORKSPACE
          environment_key: Default
        - task_key: silver
          depends_on:
            - task_key: bronze
          notebook_task:
            notebook_path: ../../src/notebooks/silver.ipynb
            base_parameters:
              catalog_source: ${var.bronze_catalog}
              catalog_sink: ${var.silver_catalog}
            source: WORKSPACE
          environment_key: Default
        - task_key: gold
          depends_on:
            - task_key: silver
          notebook_task:
            notebook_path: ../../src/notebooks/gold.ipynb
            base_parameters:
              catalog_source: ${var.silver_catalog}
              catalog_sink: ${var.gold_catalog}
            source: WORKSPACE
          environment_key: Default
      tags:
        business.domain: Reservations
        business.owner: Data Engineering Team
      queue:
        enabled: true
      environments:
        - environment_key: Default
          spec:
            environment_version: "5"
      performance_target: STANDARD
