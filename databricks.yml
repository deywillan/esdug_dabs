# This is a Databricks asset bundle definition for esdug_dabs.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: esdug_dabs
  uuid: 8f65021a-3ca6-47e7-a097-60feae51e612

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-981245df-3bdd.cloud.databricks.com
    variables:
      catalog: default
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-981245df-3bdd.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/deivilanmattos@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/deivilanmattos@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: default
      schema: prod
    permissions:
      - user_name: deivilanmattos@gmail.com
        level: CAN_MANAGE
